<!-- Apply saved theme before paint to avoid flash; expose toggleTheme globally -->
<script>
  (function () {
    try {
      var t = localStorage.getItem('theme');
      var preferLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
      if (t === 'light' || (!t && preferLight)) {
        document.documentElement.classList.add('light-mode');
      }
    } catch (e) {}
  })();

  function toggleTheme() {
    var isLight = document.documentElement.classList.toggle('light-mode');
    try { localStorage.setItem('theme', isLight ? 'light' : 'dark'); } catch (e) {}
    var icon = document.getElementById('theme-icon');
    if (icon) { icon.className = isLight ? 'fas fa-moon' : 'fas fa-sun'; }
  }
</script>

<!-- Layout width override + justified text + theme toggle button -->
<style>
  #main {
    max-width: 1600px !important;
  }

  .page__content p {
    text-align: justify;
  }

  /* Make masthead a flex row so the button sits beside the nav */
  .masthead__inner-wrap {
    display: flex !important;
    align-items: center !important;
  }
  .masthead__menu {
    flex: 1 !important;
    min-width: 0 !important;
  }

  /* Toggle button styling */
  #theme-toggle {
    background: none;
    border: none;
    cursor: pointer;
    color: inherit;
    font-size: 1.15em;
    padding: 0 0.8em;
    height: 70px;
    display: flex;
    align-items: center;
    flex-shrink: 0;
    opacity: 0.8;
    transition: opacity 0.2s;
  }
  #theme-toggle:hover {
    opacity: 1;
  }
  html.light-mode #theme-toggle {
    color: #333 !important;
  }
</style>

<!-- Light mode overrides (neon skin is dark by default) -->
<style>

  }

  /* --- Top navigation --- */
  html.light-mode .masthead {
    background-color: #fff !important;
    border-bottom: 1px solid #ddd !important;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08) !important;
  }
  html.light-mode .greedy-nav {
    background-color: #fff !important;
  }
  html.light-mode .greedy-nav a,
  html.light-mode .greedy-nav .masthead__menu-item a {
    color: #333 !important;
  }
  html.light-mode .greedy-nav a:hover {
    color: #000 !important;
  }

    background: #333 !important;

<!-- Dark code blocks to match neon theme -->
<style>
  div.highlighter-rouge,
  figure.highlight {
    background-color: #0d0d1a !important;

  }

  div.highlighter-rouge::before,
  figure.highlight::before {
    background-color: #1a1a30 !important;
    color: #666 !important;
  }

  .highlight,
  .highlight pre {
    background-color: #0d0d1a !important;
    color: #cdd6f4 !important;
  }

  /* inline code */
  code.highlighter-rouge {
    background-color: #1a1a30 !important;
    color: #cba6f7 !important;
    border: 1px solid #2a2a4a !important;
  }

  /* token colors — dark-friendly palette */
  .highlight .c,  .highlight .cm, .highlight .c1, .highlight .cs { color: #6c7086 !important; } /* comments */

  .highlight .ss                                                    { color: #a6e3a1 !important; } /* strings */

  .highlight .mo, .highlight .il                                    { color: #fab387 !important; } /* numbers */
  .highlight .nf, .highlight .nc, .highlight .nd, .highlight .nv,

  .highlight .nb, .highlight .bp                                    { color: #89dceb !important; } /* builtins */
  .highlight .o,  .highlight .ow                                    { color: #89dceb !important; } /* operators */
  .highlight .n,  .highlight .p                                     { color: #cdd6f4 !important; } /* default text */
  .highlight .err                                                   { color: #f38ba8 !important; } /* errors */
  .highlight .nt                                                     { color: #f38ba8 !important; } /* tags */
  .highlight .na                                                     { color: #89b4fa !important; } /* attributes */
  .highlight .no, .highlight .ni, .highlight .ne                    { color: #fab387 !important; } /* constants */
</style>
