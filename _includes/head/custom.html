<!-- Apply saved/preferred theme before paint (no flash); uses academicpages data-theme system -->
<script>
  (function () {
    try {
      var t = localStorage.getItem('theme');
      var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (t === 'dark' || (!t && prefersDark)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    } catch (e) {}
  })();

  function toggleTheme() {
    var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    if (isDark) {
      document.documentElement.removeAttribute('data-theme');
      try { localStorage.setItem('theme', 'light'); } catch (e) {}
    } else {
      document.documentElement.setAttribute('data-theme', 'dark');
      try { localStorage.setItem('theme', 'dark'); } catch (e) {}
    }
    var icon = document.getElementById('theme-icon');
    if (icon) { icon.textContent = isDark ? '🌙' : '☀️'; }
  }

  document.addEventListener('DOMContentLoaded', function () {
    var icon = document.getElementById('theme-icon');
    if (icon) {
      icon.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙';
    }
  });
</script>

<!-- Layout width + justified text + toggle button -->
<style>
  #main {
    max-width: 1600px !important;
  }
  .page__content p {
    text-align: justify;
  }

  /* Masthead flex layout so toggle button sits beside the nav */
  .masthead__inner-wrap {
    display: flex !important;
    align-items: center !important;
  }
  .masthead__menu {
    flex: 1 !important;
    min-width: 0 !important;
  }

  /* Toggle button */
  #theme-toggle {
    background: none;
    border: 2px solid rgba(0,0,0,0.25);
    border-radius: 8px;
    cursor: pointer;
    color: var(--global-masthead-link-color, #333);
    font-size: 1.1em;
    line-height: 1;
    padding: 4px 10px;
    margin-right: 0.6em;
    display: flex;
    align-items: center;
    flex-shrink: 0;
    transition: border-color 0.2s, background 0.2s;
  }
  #theme-toggle:hover {
    border-color: var(--global-base-color, #2f7f93);
    background: rgba(0,0,0,0.05);
  }
  html[data-theme="dark"] #theme-toggle {
    border-color: rgba(255,255,255,0.4);
    color: var(--global-masthead-link-color, #fff);
  }
  html[data-theme="dark"] #theme-toggle:hover {
    border-color: rgba(255,255,255,0.9);
    background: rgba(255,255,255,0.1);
  }
</style>
